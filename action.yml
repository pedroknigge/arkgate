name: 'Structrail Architecture Check'
description: 'Block merges on architecture violations (cross-layer imports, intent references) with structrail-check'
author: 'pedroknigge'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  root:
    description: 'Project root to check'
    default: '.'
  config:
    description: 'Path to structrail.config.json (relative to root)'
    default: 'structrail.config.json'
  strict-config:
    description: 'Enable strict checks; the current Action revision also requires gates and safety diagnostics'
    default: 'true'
  baseline:
    description: 'Baseline file of frozen violations (empty = disabled)'
    default: ''
  version:
    description: 'Optional exact npm version override; empty runs the checked-out Action revision'
    default: ''
  github-token:
    description: 'Token used to comment violations on the PR (empty = no comment)'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Run structrail-check
      id: structrail
      shell: bash
      env:
        INPUT_ROOT: ${{ inputs.root }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_STRICT: ${{ inputs.strict-config }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        ARGS=(--root "$INPUT_ROOT" --config "$INPUT_CONFIG")
        [ -n "$INPUT_BASELINE" ] && ARGS+=(--baseline "$INPUT_BASELINE")

        if [ -n "$INPUT_VERSION" ]; then
          # Explicit compatibility override: old releases may not expose --strict.
          [ "$INPUT_STRICT" = "true" ] && ARGS+=(--strict-config)
          RUNNER=(npx --yes --package "structrail@$INPUT_VERSION" structrail-check)
        else
          # The `uses:` ref already pins the Action revision. Install only its production
          # dependency (TypeScript) inside the Action checkout, then run this exact source.
          (cd "$ACTION_PATH" && npm ci --omit=dev --ignore-scripts)
          [ "$INPUT_STRICT" = "true" ] && ARGS+=(--strict)
          RUNNER=(node "$ACTION_PATH/bin/structrail-check.mjs")
        fi

        set +e
        "${RUNNER[@]}" "${ARGS[@]}" 2>&1 | tee structrail-check-output.txt
        STATUS=${PIPESTATUS[0]}
        {
          echo "## Structrail architecture check"
          echo ""
          echo '```'
          cat structrail-check-output.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        exit "$STATUS"

    - name: Comment violations on PR
      if: failure() && github.event_name == 'pull_request' && inputs.github-token != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        {
          echo "### Structrail architecture check failed"
          echo ""
          echo '```'
          cat structrail-check-output.txt
          echo '```'
          echo ""
          echo "_Layer rules live in \`structrail.config.json\`._"
        } > structrail-comment.md
        gh pr comment "$PR" --repo "$REPO" --body-file structrail-comment.md
