name: Eval (nightly)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  comparative-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Eval corpus (static labels + ark-check)
        run: npm run eval:corpus

      - name: Comparative eval (static oracle)
        run: node eval/comparative-run.mjs

      - name: Upload comparative report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: comparative-eval-report
          path: eval/comparative-report.json

  agent-eval:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Live agent eval (optional — needs claude on PATH)
        if: ${{ vars.ARK_RUN_LIVE_AGENT_EVAL == 'true' }}
        run: node eval/run.mjs
        env:
          ARK_EVAL_CASE: port-proof-inject-binding

      - name: Upload live-agent report
        if: ${{ always() && vars.ARK_RUN_LIVE_AGENT_EVAL == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: live-agent-eval-report
          path: eval/report.json
          if-no-files-found: error
