name: Publish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.13.0.
        required: true
        type: string
      dry_run:
        description: Verify and pack without publishing to npm.
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm ci

      # Release-trust (P0): unsigned tags fail closed.
      - name: Verify release tag
        run: node scripts/verify-release-tag.mjs "$RELEASE_TAG"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}

      - name: Require GitHub release first
        run: gh release view "$RELEASE_TAG"
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}

      - name: Verify package is still unpublished
        run: |
          set -euo pipefail
          package="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if npm view "$package@$version" version >/dev/null 2>&1; then
            echo "$package@$version is already published" >&2
            exit 1
          fi

      - name: Release dry run
        if: ${{ inputs.dry_run }}
        run: npm run release:npm -- --dry

      # Do not use `secrets.*` in `if:` (invalid in workflow_dispatch expressions).
      # Prefer NPM_TOKEN when set (first publish of a new package name, or emergency).
      # Otherwise use Trusted Publishing via OIDC (npm run release:npm).
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Publishing with NPM_TOKEN (Automation token)…"
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> "$GITHUB_WORKSPACE/.npmrc"
            # Still run full verify suite, then publish with token.
            npm run typecheck
            npm run test:confidence
            npm run security:audit
            npm run check:architecture
            npm publish --access public --provenance
          else
            echo "No NPM_TOKEN secret — publishing with OIDC trusted publishing…"
            npm run release:npm
          fi

      - name: Upload npm tarball checksum
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          package="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          tarball_url=""
          for attempt in $(seq 1 30); do
            if tarball_url="$(npm view "$package@$version" dist.tarball 2>/dev/null)" && [ -n "$tarball_url" ]; then
              break
            fi
            echo "npm has not surfaced $package@$version yet (attempt $attempt); retrying in 5s..."
            sleep 5
          done
          if [ -z "$tarball_url" ]; then
            echo "::error::npm never surfaced $package@$version tarball; publish likely succeeded — upload the checksum manually."
            exit 1
          fi
          tarball="$package-$version.tgz"
          curl -fsSL "$tarball_url" -o "$tarball"
          shasum -a 256 "$tarball" > "$tarball.sha256"
          gh release upload "$RELEASE_TAG" "$tarball.sha256" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
