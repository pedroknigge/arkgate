name: CI

# pull_request (no branch filter) gates EVERY PR regardless of base branch; push is scoped
# to main so direct commits to main are gated without double-running the job on PR branches
# (which would fire both push and pull_request for the same commit).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm run security:audit

      - name: Typecheck
        run: npm run typecheck

      - name: JavaScript syntax (bin/scripts/eval)
        run: npm run check:js

      # R1: bin/ark-layer-match.mjs must be regenerated from src/domain/layerMatch.ts
      - name: Layer-match derived artifact (drift guard)
        run: npm run check:layer-match

      # R4: remediation + baselineKey pure helpers generated from Domain TS
      - name: CLI pure helpers derived artifacts (drift guard)
        run: npm run check:cli-pure

      - name: Test with coverage thresholds
        run: npm run test:coverage
        # Includes evalCorpus.test.ts (spawns npm run eval:corpus) — no separate step

      - name: Build
        run: npm run build

      # Mandatory architecture gate: ark-check exits non-zero on any layer violation,
      # which fails the job and blocks the merge. --strict-config also fails the job on
      # governance-coverage warnings (e.g. unclassified source files), so the config can
      # never silently rot below 100% coverage of src.
      - name: Architecture gate (ark-check)
        run: npm run check:architecture

  node-compat:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:js
      - run: node bin/ark-check.mjs --version

  # Consumer TypeScript matrix: ark-check --plan against TS 5 / 6 / 7 installed in a
  # throwaway fixture (tests/fixtures/ts-consumer). Ensures gate load + resolve work
  # while the ecosystem moves to TypeScript 7 (native). See docs/typescript-support.md.
  ts-compat:
    name: TypeScript ${{ matrix.typescript }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript: ['5.9.3', '6.0.3', '7.0.2']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ark-check --plan on consumer fixture (typescript@${{ matrix.typescript }})
        run: node scripts/ts-compat-matrix.mjs ${{ matrix.typescript }}
