name: CI

# pull_request (no branch filter) gates EVERY PR regardless of base branch; push is scoped
# to main so direct commits to main are gated without double-running the job on PR branches
# (which would fire both push and pull_request for the same commit).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  adapter-parity:
    name: Adapter parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:adapter-parity

  onboarding-matrix:
    name: Onboarding ${{ matrix.fixture }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - library/small
          - library/medium
          - library/large
          - api/small
          - api/medium
          - api/large
          - frontend/small
          - frontend/medium
          - frontend/large
          - monorepo/small
          - monorepo/medium
          - monorepo/large
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify offline onboarding shard
        run: npm run test:onboarding-matrix:shard
        env:
          O04_SHARD: ${{ matrix.fixture }}

  performance:
    name: Performance budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Enforce V01 performance budgets
        run: npm run bench:scale -- --sizes 1000,10000,50000 --runs 5 --fail-budget --json --out performance.v1.json
      - name: Hook-path end-to-end budgets (U06)
        run: node scripts/hook-path-bench.mjs --sizes 1000,10000 --runs 9 --fail-budget --json --out hook-performance.v1.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: performance-v1-${{ github.sha }}
          path: |
            performance.v1.json
            hook-performance.v1.json

  fuzz:
    name: Deterministic fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:fuzz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: fuzz-pr-${{ github.sha }}
          path: reports/fuzz
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Security audit
        run: npm run security:audit

      - name: Typecheck
        run: npm run typecheck

      - name: JavaScript syntax (bin/scripts/eval)
        run: npm run check:js

      # R1: bin/ark-layer-match.mjs must be regenerated from src/domain/layerMatch.ts
      - name: Layer-match derived artifact (drift guard)
        run: npm run check:layer-match

      # R4: remediation + baselineKey pure helpers generated from Domain TS
      - name: CLI pure helpers derived artifacts (drift guard)
        run: npm run check:cli-pure

      - name: Analysis engine CLI bundle (drift guard)
        run: npm run check:analysis-engine

      - name: Test confidence (coverage + mutation)
        run: npm run test:confidence
        # Includes evalCorpus.test.ts (spawns npm run eval:corpus) — no separate step

      - name: Build
        run: npm run build

      - name: Gate/runtime package isolation smoke
        run: npm run test:package-isolation

      - name: Verify V04 release artifacts
        run: npm run check:release-artifacts -- --out release-artifacts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts-${{ github.sha }}
          path: release-artifacts

      # Mandatory architecture gate: ark-check exits non-zero on any layer violation,
      # which fails the job and blocks the merge. --strict-config also fails the job on
      # governance-coverage warnings (e.g. unclassified source files), so the config can
      # never silently rot below 100% coverage of src.
      - name: Architecture gate (ark-check)
        run: npm run check:architecture
        env:
          ARK_POLICY_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}

  node-compat:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:js
      - run: node bin/ark-check.mjs --version

  # Packed consumer matrix: 4 Node versions × 3 package managers × TS 5/6/7.
  # The checkout is orchestration only; every product command resolves from the exact
  # release tarball verified and uploaded by build. See docs/typescript-support.md.
  ts-compat:
    name: Packed TS / Node ${{ matrix.node }} / ${{ matrix.pm.name }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
        pm:
          - { name: npm, version: 10.8.2 }
          - { name: pnpm, version: 9.15.9 }
          - { name: yarn, version: 4.17.1 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install pinned Corepack
        run: npm install --global corepack@0.32.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ github.sha }}
          path: ${{ runner.temp }}/release-artifacts

      - name: Exercise packed candidate across TypeScript 5/6/7
        run: >-
          node scripts/ts-compat-matrix.mjs
          --artifact-dir "${{ runner.temp }}/release-artifacts/gate"
          --package-manager "${{ matrix.pm.name }}"
          --manager-version "${{ matrix.pm.version }}"
          --typescript 5.9.3,6.0.3,7.0.2
          --out "${{ runner.temp }}/ts-compat/report.json"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ts-compat-node-${{ matrix.node }}-${{ matrix.pm.name }}-${{ github.sha }}
          path: ${{ runner.temp }}/ts-compat/report.json
          if-no-files-found: error

  ts-compat-gate:
    name: TypeScript compatibility gate
    if: ${{ always() }}
    needs: ts-compat
    runs-on: ubuntu-latest
    steps:
      - name: Require every packed compatibility cell
        env:
          MATRIX_RESULT: ${{ needs.ts-compat.result }}
        run: test "$MATRIX_RESULT" = success
